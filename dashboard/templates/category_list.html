<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h5 class="mb-0">DANH SÁCH DANH MỤC</h5>
            <a href="{% url 'category_add' %}" class="btn btn-light btn-sm">+ Thêm Danh Mục</a>
        </div>
        <div class="card-body">
            <ul class="list-group">
                {% for cat in categories %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ cat.name }}
                    <span class="badge bg-secondary rounded-pill">{{ cat.product_set.count }} sản phẩm</span>
                </li>
                {% empty %}
                <li class="list-group-item text-center">Chưa có danh mục nào.</li>
                {% endfor %}
            </ul>
            <a href="{% url 'product_list' %}" class="btn btn-link mt-3"> Quay lại quản lý sản phẩm</a>
        </div>
    </div>
</div>
