<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header py-3 d-flex justify-content-between align-items-center" style="background-color: #006400;">
            <h5 class="mb-0 text-white fw-bold">📦 QUẢN LÝ KHO TRÁI CÂY</h5>
            <a href="{% url 'product_add' %}" class="btn btn-light btn-sm fw-bold">+ THÊM MỚI</a>
        </div>
        
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 100px;">Ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th>Giá niêm yết</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in products %}
                        <tr>
                            <td>
                                {% if p.image %}
                                    <img src="{{ p.image.url }}" style="width: 70px; height: 70px; object-fit: cover;" class="rounded shadow-sm">
                                {% else %}
                                    <div class="bg-light text-center rounded" style="width: 70px; height: 70px; line-height: 70px;">
                                        <small class="text-muted">No Alt</small>
                                    </div>
                                {% endif %}
                            </td>
                            <td>
                                <div class="fw-bold text-dark">{{ p.name }}</div>
                                <small class="text-muted">Danh mục: {{ p.category.name }}</small>
                            </td>
                            <td>
                                <span class="badge bg-danger-subtle text-danger px-3 py-2 fs-6">
                                    {{ p.price }} đ
                                </span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <a href="{% url 'product_edit' p.pk %}" class="btn btn-outline-warning btn-sm">📝 Sửa</a>
                                    <a href="{% url 'product_delete' p.pk %}" class="btn btn-outline-danger btn-sm">🗑️ Xóa</a>
                                </div>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i>Kho hàng đang trống. Hãy nhấn nút thêm mới để bắt đầu!</i>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
