<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">📁 QUẢN LÝ DANH MỤC</h5>
            <a href="{% url 'category_add' %}" class="btn btn-primary btn-sm">+ THÊM LOẠI MỚI</a>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên danh mục</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>{{ cat.id }}</td>
                        <td><strong>{{ cat.name }}</strong></td>
                        <td class="text-center">
                            <a href="#" class="btn btn-sm btn-outline-warning">Sửa</a>
                            <a href="#" class="btn btn-sm btn-outline-danger">Xóa</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">Chưa có danh mục nào. Hãy thêm ngay!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <hr>
            <a href="{% url 'product_list' %}" class="text-decoration-none">← Quay lại Quản lý sản phẩm</a>
        </div>
    </div>
</div>
